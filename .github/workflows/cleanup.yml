---
name: Automated Cleanup

# yamllint disable-line rule:truthy
on:
  # Run weekly on Sundays at 2 AM UTC (low traffic time)
  schedule:
    - cron: '0 2 * * 0'

  # Allow manual trigger for testing or urgent cleanup
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not create PR)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-unused:
    name: Detect Unused Files
    runs-on: ubuntu-latest
    outputs:
      unused_files: ${{ steps.unused.outputs.unused_files }}
      quality_passed: ${{ steps.quality.outputs.quality_passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0  # Full history for accurate detection

      - name: Detect unused scripts
        id: unused
        run: |
          {
            echo "# Detecting potentially unused files..."
            echo ""

            unused_files=""

            # Check each shell script for references
            for script in scripts/*.sh; do
              if [ -f "${script}" ]; then
                script_name=$(basename "${script}")
                # Check if script is referenced anywhere
                refs=$(grep -r "${script_name}" . --include="*.yml" --include="*.yaml" \
                  --include="*.sh" --include="*.md" 2>/dev/null | \
                  grep -v "^Binary" | grep -v "^\./\.git" | grep -c . || true)

                if [ "${refs}" -eq 0 ] && \
                   [ "${script_name}" != "quality_gate.sh" ] && \
                   [ "${script_name}" != "setup-skills.sh" ]; then
                  echo "⚠️ Potentially unused: ${script_name} (0 references found)"
                  unused_files="${unused_files} ${script}"
                fi
              fi
            done

            # Check for broken symlinks
            broken_links=$(find . -type l ! -exec test -e {} \; -print 2>/dev/null | \
              grep -v ".git" || true)
            if [ -n "${broken_links}" ]; then
              echo "## Broken Symlinks"
              echo "${broken_links}"
            fi

            # Check for old temp/debug files
            old_files=$(find scripts/ .agents/ \
              -name "*debug*" -o -name "*temp*" -o -name "*backup*" 2>/dev/null || true)
            if [ -n "${old_files}" ]; then
              echo "## Temp/Debug Files"
              echo "${old_files}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "unused_files=${unused_files}" >> "${GITHUB_OUTPUT}"

      - name: Check file ages
        id: ages
        run: |
          {
            echo "## Files Not Modified in 90+ Days"
            echo ""

            # Find files not modified in 90 days
            old_files=$(find scripts/ .agents/ -type f -mtime +90 \
              -not -path "./.git/*" -not -name "*.md" 2>/dev/null || true)

            if [ -n "${old_files}" ]; then
              echo "${old_files}" | head -10
              echo ""
              echo "*(showing first 10)*"
            else
              echo "✅ No old files detected"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run quality gate
        id: quality
        run: |
          echo "## Quality Gate Check" >> "${GITHUB_STEP_SUMMARY}"

          if ./scripts/quality_gate.sh; then
            echo "✅ Quality gate passes" >> "${GITHUB_STEP_SUMMARY}"
            echo "quality_passed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "❌ Quality gate failed - cleanup aborted" >> "${GITHUB_STEP_SUMMARY}"
            echo "quality_passed=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
        continue-on-error: true

      - name: Create cleanup PR
        if: github.event.inputs.dry_run != 'true' && steps.quality.outputs.quality_passed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "cleanup: automated detection of unused files"
          title: "[Automated] Cleanup: Remove unused files and technical debt"
          body: |
            ## Automated Cleanup Report

            This PR was automatically generated by the cleanup workflow.

            ### Detected Issues
            ${{ steps.unused.outputs.unused_files }}

            ### Manual Review Required
            ⚠️ **Do not merge without human review**

            Please verify:
            - [ ] Each file is truly unused (not dynamically referenced)
            - [ ] No production functionality is affected
            - [ ] Quality gate passes
            - [ ] Documentation is updated if needed

            ### How to Disable
            If this PR is not helpful, you can:
            1. Close this PR
            2. Add files to `.cleanup-ignore` to exclude from future scans
            3. Disable workflow in repository settings

          draft: true
          branch: automated/cleanup-${{ github.run_number }}
          delete-branch: true
          labels: |
            cleanup
            automated
            technical-debt

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: detect-unused
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## Cleanup Workflow Complete"
            echo ""
            echo "- Detection job: ${{ needs.detect-unused.result }}"
            echo "- If files were detected, a DRAFT PR was created"
            echo "- Human review required before merging"
          } >> "${GITHUB_STEP_SUMMARY}"
